<!--
  BASE.HTML — 4 TARGETED FIXES
  Apply these changes to your existing templates/base.html
  Each section is clearly marked.
-->


<!-- ============================================================
  FIX 1: Add font preconnect + move Chart.js OUT of <head>
  REPLACE your current <head> block with this version.
  Key changes:
    - Added preconnect for fonts.googleapis.com (loads fonts ~300ms faster)
    - Removed <script src="chart.js"> from <head> — it was blocking page render
      (Chart.js is 200KB. Every page was frozen until it downloaded.)
    - Added Rajdhani font import (used in Solo theme but was missing)
  ============================================================ -->

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>{% block title %}Life RPG | System{% endblock %}</title>

  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='logo.png') }}">
  <meta name="theme-color" content="#080b12">

  <!-- FIX: Preconnect so font DNS resolves before browser hits the @import -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

  <!-- Your stylesheets -->
  <link rel="stylesheet" href="{{ url_for('static', filename='modern.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

  <!-- intro.js CSS (only load on pages that actually use it) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intro.js/7.2.0/introjs.min.css">

  <!-- FIX: Chart.js REMOVED from here — moved to bottom of <body>
       It was a render-blocking script. Page now shows instantly. -->

  <!-- Intro.js tooltip overrides -->
  <style>
    .introjs-tooltip {
      background-color: rgba(8, 11, 18, 0.97) !important;
      border: 1px solid #38bdf8 !important;
      box-shadow: 0 0 20px rgba(56, 189, 248, 0.2) !important;
      color: #f1f5f9 !important;
      font-family: 'Inter', sans-serif;
      border-radius: 12px !important;
    }
    .introjs-arrow.top    { border-bottom-color: #38bdf8 !important; }
    .introjs-arrow.bottom { border-top-color: #38bdf8 !important; }
    .introjs-arrow.left   { border-right-color: #38bdf8 !important; }
    .introjs-arrow.right  { border-left-color: #38bdf8 !important; }
    .introjs-button {
      background-color: #38bdf8 !important;
      color: #000 !important;
      text-shadow: none !important;
      border-radius: 6px !important;
      font-weight: 600;
      border: none !important;
    }
    .introjs-skipbutton {
      background: transparent !important;
      color: #f87171 !important;
      border: 1px solid rgba(248,113,113,0.3) !important;
      border-radius: 6px !important;
    }
  </style>

  <!-- Solo Leveling theme overrides (keep your existing block here unchanged) -->
  {% if current_user.is_authenticated and current_user.theme == 'solo' %}
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ... your existing solo theme styles ... */
  </style>
  {% endif %}

</head>


<!-- ============================================================
  FIX 2: Navbar brand — it was using Orbitron font but the font
  was never imported. Fixed in the new style.css via @import.
  Also cleaned up the inline style on the nav element.

  REPLACE your <nav> opening tag:
  ============================================================ -->

<!-- BEFORE: -->
<!-- <nav class="navbar navbar-expand-lg navbar-dark mb-4 sticky-top" style="background: rgba(5, 7, 10, 0.95); border-bottom: 1px solid rgba(255, 255, 255, 0.1);"> -->

<!-- AFTER (remove the inline style — it's now in style.css): -->
<nav class="navbar navbar-expand-lg navbar-dark mb-4 sticky-top">
  <!-- rest of navbar unchanged -->
</nav>


<!-- ============================================================
  FIX 3: Add Chart.js at the BOTTOM of <body>, before your scripts.
  This is the single biggest render-speed fix.

  FIND this block near the bottom of your <body>:
    <script src="https://cdnjs.cloudflare.com/ajax/libs/intro.js/7.2.0/intro.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script src="{{ url_for('static', filename='theme.js') }}"></script>

  REPLACE with:
  ============================================================ -->

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>  <!-- MOVED HERE from <head> -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/intro.js/7.2.0/intro.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='script.js') }}"></script>
  <script src="{{ url_for('static', filename='theme.js') }}"></script>


<!-- ============================================================
  FIX 4: Page hero section — it shows generic placeholder text
  ("A smoother, richer interface...") on EVERY page including
  the dashboard. Replace the page-hero block with something clean:
  ============================================================ -->

<!-- FIND your {% block page_header %} section and REPLACE with: -->

{% block page_header %}
<div class="d-flex align-items-center justify-content-between mb-4 pt-1">
  <div>
    <p class="section-label mb-1">{% block page_eyebrow %}{% endblock %}</p>
    <h1 class="h4 mb-1 fw-bold" style="font-family:'Exo 2',sans-serif;">
      {% block page_title %}Command Center{% endblock %}
    </h1>
    <p class="text-muted small mb-0">{% block page_subtitle %}{% endblock %}</p>
  </div>
  <div>{% block page_actions %}{% endblock %}</div>
</div>
{% endblock %}

<!-- This replaces the massive hero section + stats panels that
     was taking up 120px of height on every single page. -->
